name: ci

# Fast safety net for PRs and pushes to main. Mirrors the local
# `make ci` flow: lint + format check + fast pytest suite + build sanity.
#
# The slow integration suite (`make ci-slow`) is NOT run in CI — it
# downloads ~150 MB of OCR models from Hugging Face and is too flaky /
# expensive to run on every PR. The release flow gates the slow suite
# locally via `scripts/do-release.sh` before any tag is created.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    name: lint + fast tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs needs git history to derive the version

      - uses: astral-sh/setup-uv@v4
        with:
          version: latest

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync deps
        run: uv sync --group dev

      - name: Lint (ruff check)
        run: uv run ruff check

      - name: Format check (ruff format --check)
        run: uv run ruff format --check

      - name: Fast pytest suite
        run: uv run pytest tests/ -v

      - name: Build sanity-check (wheel + sdist)
        run: uv build
