name: release

# Triggered by an annotated tag push (`v*`). The local pre-flight
# (`scripts/do-release.sh` → `make ci-slow`) is the primary safety net;
# this workflow is the build + publish step.
#
# Steps:
#   1. Check out at full depth (hatch-vcs derives the version from tags).
#   2. Build wheel + sdist with uv.
#   3. Attest build provenance via Sigstore (actions/attest-build-provenance).
#   4. Publish a GitHub Release with auto-generated notes and attach
#      dist/*.whl + dist/*.tar.gz as assets.
#
# install.sh downloads the wheel asset from the latest GitHub Release —
# there is no PyPI publish.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CI_UV_VERSION: "0.11.16"

jobs:
  release:
    name: build + publish GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write       # softprops/action-gh-release needs this to create the Release
      id-token: write       # required by attest-build-provenance for Sigstore
      attestations: write   # required by attest-build-provenance to upload the attestation
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0  # hatch-vcs needs full history for the version
          persist-credentials: false

      # astral-sh/setup-uv stopped publishing floating major/minor tags from v8
      # onward (immutable-release policy, see v8.0.0 notes), so this pins to a
      # specific release rather than `@v8`. Bump manually when upgrading.
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: ${{ env.CI_UV_VERSION }}

      - name: Set up Python
        run: uv python install 3.12

      - name: Check release dependency sources
        run: make check-release-deps

      - name: Run release CI gate
        run: make ci-slow

      - name: Build sdist + wheel
        run: uv build

      - name: List built artifacts
        run: ls -la dist/

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: "dist/*"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
          fail_on_unmatched_files: true

      # Notify pdomain/pdomain-index-pip so it regenerates the PEP 503
      # simple index right away. Without this, the index catches up via
      # its 15-min cron — fine, just slower for downstream installers.
      #
      # Requires repo secret PDOMAIN_INDEX_DISPATCH_TOKEN (fine-grained PAT
      # with `Contents: read` + `Metadata: read` on
      # pdomain/pdomain-index-pip — repository_dispatch on a foreign repo
      # needs Contents read/write per GitHub docs; create the PAT with
      # the minimum scope that makes the dispatch succeed).
      #
      # The `|| echo ::warning::` makes this non-fatal: if the secret is
      # missing or the PAT is misconfigured, the release still succeeds.
      - name: Notify pd-index of new release
        env:
          GH_TOKEN: ${{ secrets.PDOMAIN_INDEX_DISPATCH_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::PDOMAIN_INDEX_DISPATCH_TOKEN is not set; index will catch up via 15-min cron"
            exit 0
          fi
          gh api -X POST /repos/pdomain/pdomain-index-pip/dispatches \
            -f event_type=pd-release-published \
            -F 'client_payload[repo]=pdomain-ocr-cli' \
            -F "client_payload[tag]=$RELEASE_TAG" || \
            echo "::warning::pdomain-index-pip dispatch failed; index will catch up via 15-min cron"
