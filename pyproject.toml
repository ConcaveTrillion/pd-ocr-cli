[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project]
name = "pd-ocr-cli"
dynamic = ["version"]
description = "CLI tool for OCR-ing public domain book images to text using fine-tuned DocTR detection and recognition models"
authors = [
    { name = "CT", email = "concavetrillion@gmail.com" }
]
readme = "README.md"
license = { text = "Unlicense" }
requires-python = ">=3.10,<4.0"
dependencies = [
    "pd-book-tools",
    "huggingface_hub>=0.23",
]

[project.scripts]
pd-ocr = "pd_ocr_cli.ocr_to_txt:main"

[project.urls]
Homepage = "https://github.com/ConcaveTrillion/pd-ocr-cli"
Repository = "https://github.com/ConcaveTrillion/pd-ocr-cli"

[dependency-groups]
dev = [
    "pre-commit>=4.6.0",
    "pytest>=8.3",
    "ruff>=0.12.5",
]

[tool.uv.sources]
pd-book-tools = { git = "https://github.com/ConcaveTrillion/pd-book-tools.git", tag = "v0.6.2" }

[tool.hatch.version]
source = "vcs"

[tool.ruff]
line-length = 100
